<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Geetest GT4 SDK Demo</title>
    <style>
        body {
            margin: 50px 0;
            text-align: center;
            font-family: "PingFangSC-Regular", "Open Sans", Arial, "Microsoft YaHei", sans-serif;
        }
        .inp { border: 1px solid #ccc; padding: 0 10px; width: 278px; height: 40px; font-size: 18px; }
        .btn { border: 1px solid #ccc; width: 100px; height: 40px; font-size: 16px; cursor: pointer; }
        #notice { color: red; }
        .hide { display: none; }
    </style>
</head>
<body>
<h1>极验 GT4 验证 Demo</h1>
<form id="demoForm" action="/geetest/validate" method="post">
    <br>
    <div>
        <label for="username">用户名：</label>
        <input class="inp" id="username" name="username" type="text" value="demo">
    </div>
    <br>
    <div id="captcha-box"></div>
    <br>
    <p id="notice" class="hide">请先完成验证</p>
    <input class="btn" id="submit" type="submit" value="提交">
</form>

<script src="https://static.geetest.com/v4/gt4.js"></script>
<script>
    let captchaObj = null;
    let captchaReady = false;
    let captchaId = "";

    fetch("/geetest/register?t=" + Date.now())
        .then(r => r.json())
        .then(data => {
            if (data.status === 1) {
                document.getElementById("captcha-box").innerHTML = "<p>已跳过人机验证（Boundary）</p>";
                return;
            }
            captchaId = data.captcha_id;
            initGeetest4({
                captchaId: captchaId,
                product: "float",
                language: "zho",
                protocol: "https://"
            }, function (captcha) {
                captchaObj = captcha;
                captcha.appendTo("#captcha-box")
                    .onReady(function () { captchaReady = true; })
                    .onError(function (e) { console.error("captcha error", e); });
            });
        });

    document.getElementById("demoForm").addEventListener("submit", function (e) {
        if (!captchaObj || !captchaReady) {
            return;
        }
        const result = captchaObj.getValidate();
        if (!result) {
            e.preventDefault();
            document.getElementById("notice").classList.remove("hide");
            return;
        }
        for (const key of ["lot_number", "captcha_output", "pass_token", "gen_time"]) {
            let input = document.createElement("input");
            input.type = "hidden";
            input.name = key;
            input.value = result[key];
            e.target.appendChild(input);
        }
    });
</script>
</body>
</html>
